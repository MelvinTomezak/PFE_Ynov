name: CI

# Intégration continue : à chaque push et pull request, le code est
# récupéré, analysé statiquement, puis les tests unitaires sont exécutés.
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  quality:
    name: Analyse & tests
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Installation des dépendances
        run: flutter pub get

      - name: Analyse statique
        run: flutter analyze

      - name: Tests unitaires
        run: flutter test
